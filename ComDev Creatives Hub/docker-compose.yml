version: '3.9'

services:
  comdev-creatives-hub:
    build: .
    ports:
      - "3000:3000"
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - JWT_SECRET=dev-secret-key
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./content:/app/content
    command: npm run dev
