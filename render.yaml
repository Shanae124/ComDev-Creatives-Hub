databases:
  - name: protexxalearn-db
    databaseName: protexxalearn
    user: protexxalearn
    plan: free

services:
  - type: web
    name: protexxalearn
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3001
      - key: DB_SSL
        value: true
      - key: EMAIL_SERVICE
        value: ethereal
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: protexxalearn-db
          property: connectionString
      - key: BASE_URL
        value: https://protexxalearn.onrender.com
      - key: CORS_ORIGINS
        value: "*"
